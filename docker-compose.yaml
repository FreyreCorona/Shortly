services:
  db:
    image: postgres:17
    container_name: shortly_db
    env_file:
      - .env
    expose:
      - ${POSTGRES_PORT}
    volumes:
      - shortly_db_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always

  migrate:
    image: migrate/migrate
    container_name: migrations
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./conf/migrations:/migrations
    restart: always
    entrypoint: >
      sh -c "
      echo 'executing migrations';
      migrate -path=/migrations -database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable up
      "

  cache:
    image: valkey/valkey
    container_name: shortly_cache
    env_file:
      - .env
    entrypoint: >
      sh -c '
      echo "port ${VALKEY_PORT}" > valkey.conf &&
      echo "requirepass \"${VALKEY_PASSWORD}\"" >> valkey.conf &&
      echo "user ${VALKEY_USERNAME} on allcommands allkeys >\"${VALKEY_PASSWORD}\"" >> valkey.conf &&
      exec valkey-server valkey.conf'
    restart: always
    expose:
      - ${VALKEY_PORT}

  gateway:
    image: krakend
    container_name: krakend
    ports:
      - ${KRAKEND_GATEWAY_PORT}:${KRAKEND_GATEWAY_PORT}
    volumes:
      - ./conf/krakend:/etc/krakend
    restart: always

  queue:
    image: rabbitmq:4-management
    container_name: queue
    restart: always
    env_file:
      - .env
    expose:
      - ${RABBITMQ_PORT}
      - 15692
    command: bash -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"

  shortener_svc:
    build: ./src/shortener_svc
    container_name: shortener_svc
    env_file:
      - .env
    restart: always
    expose:
      - ${URL_SHORTENER_SVC_PORT}
      - ${URL_SHORTENER_SVC_GRPC_PORT}
      - ${METRICS_PORT}

  redirect_svc:
    build: ./src/redirect_svc
    container_name: redirect_svc
    env_file:
      - .env
    restart: always
    expose:
      - ${REDIRECT_SVC_PORT}
      - ${REDIRECT_SVC_GRPC_PORT}
      - ${METRICS_PORT}

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    restart: always
    env_file:
      - .env
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"
    expose:
      - 9187

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: redis-exporter
    restart: always
    env_file:
      - .env
    environment:
      REDIS_ADDR: "${VALKEY_HOST}:${VALKEY_PORT}"
      REDIS_PASSWORD: "${VALKEY_PASSWORD}"
    expose:
      - 9121

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    volumes:
      - ./conf/prometheus:/etc/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "${PROMETHEUS_PORT}:9090"
    depends_on:
      - shortener_svc
      - redirect_svc
      - postgres-exporter
      - redis-exporter

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    volumes:
      - ./conf/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./conf/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus

volumes:
  shortly_db_volume:
