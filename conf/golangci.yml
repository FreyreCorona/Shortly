version: "2"
run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: cfg

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - revive
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    revive:
      severity: warning
      rules:
        - name: var-naming
          arguments:
            - ["ID", "URL", "HTTP"]
        - name: indent-error-flow
        - name: package-comments

formatters:
  settings:
    gofumpt:
      extra-rules: true

issues:
  max-same-issues: 3
