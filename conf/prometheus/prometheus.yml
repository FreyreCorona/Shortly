global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'shortener-svc'
    static_configs:
      - targets: ['shortener_svc:9090']

  - job_name: 'redirect-svc'
    static_configs:
      - targets: ['redirect_svc:9090']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'valkey-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'rabbitmq'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['queue:15692']
